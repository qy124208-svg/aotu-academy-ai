<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凹凸学园 · 百日倒数 - Aotu Academy 100 Days</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --border:#e94560; --text:#e6edf3; --dim:#8b949e;
  --accent:#e94560; --gold:#f0c040; --green:#3fb950; --blue:#58a6ff; --purple:#bc8cff;
  --card:#1c2128; --hover:#252d38;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{max-width:800px;margin:0 auto;padding:8px}
.cdbanner{background:linear-gradient(135deg,#1a1a3e,#2d1a3e);border:2px solid var(--border);border-radius:16px;padding:14px 20px;text-align:center;margin:8px 0;position:relative;overflow:hidden}
.cdbanner .daynum{font-size:3.5em;font-weight:900;color:var(--accent);line-height:1;text-shadow:0 0 20px rgba(233,69,96,0.5)}
.cdbanner .daylabel{font-size:0.85em;color:var(--dim);letter-spacing:2px;margin-top:2px}
.cdbanner .daysbar{height:3px;background:#333;border-radius:2px;margin-top:8px}
.cdbanner .daysfill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s}
.panel{background:var(--panel);border-radius:12px;padding:16px;margin:8px 0;border:1px solid #30363d}
.panel h2{color:var(--accent);font-size:1em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.btn{display:inline-block;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:0.9em;font-weight:bold;transition:all 0.2s;margin:3px;font-family:inherit;position:relative;z-index:1}
.btn:active{transform:scale(0.97)}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#c0392b;transform:translateY(-1px)}
.btn-s{background:var(--card);color:var(--text);border:1px solid #444}.btn-s:hover{background:var(--hover);border-color:#888}
.btn-xs{padding:4px 10px;font-size:0.75em}
.btn-choice{background:var(--card);border:1px solid #444;color:var(--text);text-align:left;padding:13px 16px;width:100%;margin:4px 0;font-size:0.9em;border-radius:8px;cursor:pointer;transition:all 0.2s;line-height:1.5}
.btn-choice:hover{border-color:var(--gold);background:#252d38}
.btn-loc{background:var(--card);border:1px solid #333;color:var(--text);text-align:left;padding:12px 14px;border-radius:8px;width:100%;cursor:pointer;margin:3px 0;display:flex;align-items:center;gap:10px;transition:all 0.2s}
.btn-loc:hover{border-color:var(--accent);background:var(--hover)}
.btn-loc:active{transform:scale(0.97);border-color:var(--gold)}
.btn-loc .locemoji{font-size:1.6em;flex-shrink:0}
.btn-loc .locinfo{flex:1}
.btn-loc .locname{font-weight:bold;font-size:0.9em}
.btn-loc .lochars{font-size:0.7em;color:var(--dim);margin-top:2px}
.statusbar{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:var(--card);border-radius:8px;margin:6px 0;font-size:0.75em;align-items:center}
.stat{background:#1a1a2e;padding:3px 8px;border-radius:4px;white-space:nowrap}
.stat s{color:var(--gold);font-weight:bold;font-style:normal}
.eventbox{background:var(--card);border-radius:10px;padding:18px;margin:8px 0;border-left:3px solid var(--accent);line-height:1.9}
.eventbox .narration{white-space:pre-line;color:var(--text);font-size:0.95em}
.feedback{background:#0d2818;border:2px solid var(--green);border-radius:10px;padding:14px;margin:10px 0;animation:fadeIn 0.5s}
.feedback .fbtitle{color:var(--gold);font-weight:bold;margin-bottom:4px;font-size:0.85em}
.feedback .fbtext{line-height:1.8;white-space:pre-line;font-size:0.9em}
.feedback .fbaff{font-size:0.8em;margin-top:8px;color:var(--dim)}
.fbup{color:var(--green)}.fbdown{color:#f85149}
.affgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px}
.affcard{background:var(--card);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:7px}
.affcard .affemoji{font-size:1.3em;flex-shrink:0;width:30px;text-align:center}
.affcard .affinfo{flex:1;min-width:0}
.affcard .affname{font-size:0.8em;font-weight:bold}
.affcard .affbar{height:3px;background:#333;border-radius:2px;margin-top:3px}
.affcard .afffill{height:100%;border-radius:2px;transition:width 0.5s}
.affcard .affstage{font-size:0.65em;color:var(--dim);margin-top:1px}
.endbox{text-align:center;padding:40px 20px}
.endbox .endicon{font-size:6em;margin:20px 0}
.endbox h2{font-size:1.8em;letter-spacing:3px;margin:15px 0}
.endbox .endtext{line-height:2;max-width:500px;margin:15px auto;white-space:pre-line;font-size:0.95em}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadeIn 0.4s}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(240,192,64,0)}50%{box-shadow:0 0 15px rgba(240,192,64,0.4)}}
.pulse{animation:pulse 2s infinite}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake 0.3s}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.achtoast{position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#1a1a3e,#2d1a1e);border:2px solid var(--gold);border-radius:12px;padding:14px 18px;z-index:999;animation:slideIn 0.5s ease;max-width:320px}
.achtoast .achicon{font-size:2em}
.achtoast .achname{font-weight:bold;color:var(--gold);font-size:0.9em}
.achtoast .achdesc{color:var(--dim);font-size:0.75em;margin-top:2px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
@media(max-width:600px){.affgrid{grid-template-columns:repeat(2,1fr)}.cdbanner .daynum{font-size:2.5em}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  凹凸学园 · 百日倒数 v3.1                                   ║
// ║  修复：地点按钮可点击 / 属性随机 / 天赋大幅扩展               ║

// ─── 角色数据 18人 ───
const CH={

  aimi:{id:'aimi',n:'埃米',e:'😇',c:'初三A',clr:'#e67e22'},

// ─── CP数据 8对 ───
const CP={

  kaiai:{n:'卡埃',e:'🧣😇',c1:'kamier',c2:'aimi',d:'守护×天真'},
  kaining:{n:'凯柠',e:'👑🍋',c1:'kaili',c2:'anlijie',d:'大小姐×天然呆'},
  leizu:{n:'雷祖',e:'📖🗿',c1:'leide',c2:'zuma',d:'追光×沉默'},
  peipa:{n:'佩帕',e:'🐺🖊️',c1:'peili',c2:'paluosi',d:'单纯×腹黑'},
  jiarui:{n:'嘉瑞',e:'🔥❄️',c1:'jiadeluosi',c2:'gerui',d:'天才对决'},
  anlei:{n:'安雷',e:'⚔️🦁',c1:'anmixiu',c2:'leishi',d:'风纪×叛逆'},
};

// ─── 地点 10个 ───
const LC={
  classroom:{n:'教室',e:'🏫',ch:['jin','gerui','kaili','anlijie','jiadeluosi','daniel']},
  cafeteria:{n:'食堂',e:'🍱',ch:['jin','gerui','kaili','anlijie','leide','zuma','aimi','aibi','jiadeluosi','peili']},
  rooftop:{n:'天台',e:'🌇',ch:['leishi','paluosi','kamier','peili']},
  library:{n:'图书馆',e:'📚',ch:['gerui','kamier','leide','zuma','anlijie','paluosi']},
  gym:{n:'体育馆',e:'🏀',ch:['leishi','jin','jiadeluosi','leide','zuma','peili']},
  courtyard:{n:'中庭',e:'🌳',ch:['aimi','aibi','kaili','anlijie','jin','paluosi','guihu']},
  artroom:{n:'美术室',e:'🎨',ch:['kaili','anlijie']},
  stuco:{n:'学生会',e:'🏛️',ch:['anmixiu','daniel']},
  gate:{n:'校门口',e:'🚪',ch:['anmixiu','leishi','jin','aimi','aibi','daniel','leizhi']},
  clubroom:{n:'社团楼',e:'🎭',ch:['yinjue','guihu','leide','zuma','aibi','kaili','paluosi']},
};

// ─── 天赋系统 30种 ───
const TALENTS=[
  // 🔴 传说级 · 影响全局
  {id:'t_legend_1',n:'天使的碎片',e:'👼',g:5,d:'创世神残留的祝福。全属性随机+0~4，每日第一个选择额外+1好感',eff:()=>{Object.keys(G.attr).forEach(k=>G.attr[k]+=rn(0,4));G._tAngel=true;}},
  {id:'t_legend_2',n:'转校生的秘密',e:'🎭',g:5,d:'你以前在别的学校经历过什么？初始全角色好感+5，但属性全随机',eff:()=>{Object.keys(CH).forEach(k=>G.aff[k]=(G.aff[k]||0)+5);Object.keys(G.attr).forEach(k=>G.attr[k]=rn(1,10));}},
  {id:'t_legend_3',n:'命运的笔记者',e:'📕',g:5,d:'你习惯记录一切。日记内容更详细，每次写日记+1精神',eff:()=>{G._tJournal=true;G.attr.SPR+=3;}},
  {id:'t_legend_4',n:'第七感',e:'🔮',g:5,d:'你偶尔能预感到接下来会发生什么。放学后遇到CP事件的概率翻倍',eff:()=>{G._tSeventh=true;G.attr.AFF+=3;}},
  {id:'t_legend_5',n:'平行世界的旅人',e:'🌌',g:5,d:'这已经是你的第N次一百天了……继承上周目最高好感度CP的30%进度',eff:()=>{const top=Object.entries(G.aff).sort((a,b)=>b[1]-a[1]);if(top[0]){Object.keys(CP).forEach(k=>{const cp=CP[k];G.aff[cp.c1]=Math.max(G.aff[cp.c1]||0,Math.floor((top[0][1]||0)*0.3));G.aff[cp.c2]=Math.max(G.aff[cp.c2]||0,Math.floor((top[0][1]||0)*0.3));});}}},
  // 🟣 史诗级
  {id:'t_epic_1',n:'雷家远亲',e:'⚡',g:4,d:'你是雷家的远房亲戚。雷狮、卡米尔、雷蛰初始好感+15',eff:()=>{G.aff.leishi+=15;G.aff.kamier+=15;G.aff.leizhi+=15;}},
  {id:'t_epic_2',n:'圣空星交换生',e:'🌠',g:4,d:'你以前在圣空星学院待过。嘉德罗斯对你的态度与众不同，初始好感+15，学力+2',eff:()=>{G.aff.jiadeluosi+=15;G.attr.INT+=2;}},
  {id:'t_epic_3',n:'守望一族的笔友',e:'💫',g:4,d:'你和格瑞有过书信往来。格瑞初始好感+15，图书馆事件触发率提升',eff:()=>{G.aff.gerui+=15;G._tWatch=true;}},
  {id:'t_epic_4',n:'前学生会成员',e:'🏛️',g:4,d:'你在之前的学校是学生会成员。安迷修初始好感+15，学生会可随时进入',eff:()=>{G.aff.anmixiu+=15;G._tStuco=true;}},
  {id:'t_epic_5',n:'暗影使者的责编',e:'📝',g:4,d:'你竟然做过"暗影使者"的beta读者。帕洛斯&雷德初始好感+15',eff:()=>{G.aff.paluosi+=15;G.aff.leide+=15;}},
  // 🔵 稀有级
  {id:'t_rare_1',n:'学霸转校生',e:'📐',g:3,d:'学力+4。嘉德罗斯会注意到你的成绩',eff:()=>{G.attr.INT+=4;}},
  {id:'t_rare_2',n:'运动健将',e:'🏃',g:3,d:'体力+4。体育祭上你的表现会格外亮眼',eff:()=>{G.attr.STR+=4;}},
  {id:'t_rare_3',n:'社交达人',e:'💬',g:3,d:'亲和力+4。每天午餐偶遇概率大幅提升',eff:()=>{G.attr.AFF+=4;G._tSocial=true;}},
  {id:'t_rare_4',n:'天生丽质',e:'💄',g:3,d:'魅力+4。角色主动与你搭话的概率提升',eff:()=>{G.attr.CHR+=4;}},
  {id:'t_rare_5',n:'钢铁意志',e:'🧘',g:3,d:'精神+4。不容易因为负面事件降低精神',eff:()=>{G.attr.SPR+=4;}},
  {id:'t_rare_6',n:'柠檬占卜师',e:'🍋',g:3,d:'你对占卜有天然的悟性。安莉洁初始好感+15',eff:()=>{G.aff.anlijie+=15;}},
  {id:'t_rare_7',n:'美术鉴赏家',e:'🎨',g:3,d:'你能看懂凯莉画里的心思。凯莉初始好感+15',eff:()=>{G.aff.kaili+=15;}},
  {id:'t_rare_8',n:'动物 Whisperer',e:'🐱',g:3,d:'动物天生亲近你。金、埃米、银爵初始好感+10',eff:()=>{G.aff.jin+=10;G.aff.aimi+=10;G.aff.yinjue+=10;}},
  // ⚪ 普通级
  {id:'t_norm_1',n:'早起型人',e:'🌅',g:2,d:'晨间时段遇到人的概率+20%',eff:()=>{G._tEarly=true;G.attr.SPR+=1;}},
  {id:'t_norm_2',n:'夜猫子',e:'🦉',g:2,d:'放学后的自由时间体力消耗减半',eff:()=>{G._tNight=true;}},
  {id:'t_norm_3',n:'便当达人',e:'🍱',g:2,d:'你做的便当很好吃。午餐事件好感加成+2',eff:()=>{G._tBento=true;G.attr.AFF+=1;}},
  {id:'t_norm_4',n:'跑步很快',e:'💨',g:2,d:'在不同地点之间移动，有机会触发"追上了某人"的额外事件',eff:()=>{G._tRun=true;G.attr.STR+=1;}},
  {id:'t_norm_5',n:'天气预报员',e:'🌈',g:2,d:'你总能提前知道会不会下雨。雨天事件的正面选项效果+3',eff:()=>{G._tWeather=true;}},
  {id:'t_norm_6',n:'冷笑话大师',e:'🥶',g:2,d:'你讲的冷笑话意外地受欢迎。搞笑型日常事件好感+3',eff:()=>{G._tJoke=true;G.attr.CHR+=1;}},
  {id:'t_norm_7',n:'记名字很快',e:'📇',g:2,d:'第一天全班同学就记住了你。初始全员好感+3',eff:()=>{Object.keys(CH).forEach(k=>G.aff[k]=(G.aff[k]||0)+3);}},
  {id:'t_norm_8',n:'幸运星',e:'⭐',g:2,d:'你偶尔会捡到别人丢的东西——归还时会获得额外好感',eff:()=>{G._tLucky=true;}},
  {id:'t_norm_9',n:'图书管理员之友',e:'📚',g:2,d:'图书馆事件触发率提升，每次去图书馆+1学力',eff:()=>{G._tLib=true;G.attr.INT+=1;}},
  {id:'t_norm_10',n:'天台爱好者',e:'🌇',g:2,d:'天台事件触发率翻倍，在天台上休息恢复更多体力',eff:()=>{G._tRooftop=true;}},
  // ⬜ 平凡级
  {id:'t_plain_1',n:'普通的转校生',e:'😊',g:1,d:'没有特殊效果。但"普通"本身也是一种力量——你没有任何弱点',eff:()=>{G.attr.SPR+=2;}},
  {id:'t_plain_2',n:'顺其自然',e:'🍃',g:1,d:'你不太刻意追求什么。好感度自然衰减减半',eff:()=>{G._tChill=true;}},
];

// ─── 游戏状态 ───
let G={
  name:'',gender:'neutral',day:1,maxDay:100,
  slot:'morning',energy:100,
  attr:{INT:0,CHR:0,STR:0,AFF:0,SPR:0},
  aff:{},flags:{},talents:[],talentNames:[],club:null,
  journal:[],memories:[],achievements:[],
  history:[],loop:1,phase:'title',
  _tAngel:false,_tJournal:false,_tSeventh:false,_tWatch:false,
  _tStuco:false,_tSocial:false,_tEarly:false,_tNight:false,
  _tBento:false,_tRun:false,_tWeather:false,_tJoke:false,
  _tLucky:false,_tLib:false,_tRooftop:false,_tChill:false,
};
let curEv=null,toastQ=[];

function initG(){
  G.day=1;G.slot='morning';G.energy=100;
  G.attr={INT:rn(2,8),CHR:rn(2,8),STR:rn(2,8),AFF:rn(2,8),SPR:rn(2,8)}; // 随机属性！
  G.aff={};Object.keys(CH).forEach(k=>G.aff[k]=0);
  G.flags={};G.club=null;G.journal=[];G.memories=[];G.history=[];
  G.talents=[];G.talentNames=[];
  ['_tAngel','_tJournal','_tSeventh','_tWatch','_tStuco','_tSocial','_tEarly','_tNight','_tBento','_tRun','_tWeather','_tJoke','_tLucky','_tLib','_tRooftop','_tChill'].forEach(k=>G[k]=false);
}
initG();

// ─── 工具 ───
function rn(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pk(a){return a[Math.floor(Math.random()*a.length)];}
function dv(v){return Math.round(v+(Math.random()-0.5)*5);} // ±2.5范围偏差
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function cpAvg(key){const cp=CP[key];return Math.round(((G.aff[cp.c1]||0)+(G.aff[cp.c2]||0))/2);}
function stageName(v){return v>=90?'💖心动':v>=70?'💗亲密':v>=50?'💛好友':v>=30?'💚朋友':v>=10?'🤝认识':'😶初识';}

// ─── 存档 ───
function saveTo(slot){try{const d=JSON.parse(JSON.stringify(G));d._t=new Date().toISOString();localStorage.setItem('aotu4_'+slot,JSON.stringify(d));return true;}catch(e){return false;}}
function loadFrom(slot){const r=localStorage.getItem('aotu4_'+slot);if(!r)return false;try{G=JSON.parse(r);return true;}catch(e){return false;}}

// ─── 事件构建 ───
function genRandomEvent(locId){
  const loc=LC[locId];if(!loc)return null;
  const pool=loc.ch.filter(id=>CH[id]);if(pool.length===0)return null;
  const nChar=Math.min(rn(1,Math.min(3,pool.length)),pool.length);
  const chars=[];const tmp=[...pool].sort(()=>Math.random()-0.5);
  for(let i=0;i<nChar;i++)chars.push(CH[tmp[i]]);
  const mc=chars[0],sc=chars[1];

// ─── 执行选择 ───
function execChoice(ev,chIdx){
  const ch=ev.choices[chIdx];if(!ch)return{msg:'什么都没发生。',changes:[]};
  const changes=[];
  if(ch.a){ch.a.forEach(a=>{
    let val=Math.round(a.v||dv(3));
    if(G._tAngel&&G.slot==='morning')val+=1; // 天使天赋
    if(G._tBento&&G.slot==='noon')val+=2;    // 便当天赋
    if(G._tJoke&&ev.type==='random'&&ev.narration.includes('笑'))val+=3; // 冷笑话天赋
    const old=G.aff[a.id]||0;G.aff[a.id]=clamp(old+val,0,100);
    changes.push({id:a.id,n:CH[a.id]?.n||a.id,e:CH[a.id]?.e||'',old,val});
  });}
  if(ch.f)G.flags[ev.cp+'_'+ev.stage+'_fb']=ch.f;
  if(ch.m==='match'&&ev.cp)G.flags['match_'+ev.cp]=true;
  if(ev.cp&&ev.stage)G.flags['cp_'+ev.cp+'_s'+ev.stage]=true;
  if(ev.type==='calendar')G.flags['cal_'+G.day]=true;
  const msg=ch.f||'你做出了选择。';
  G.journal.push({day:G.day,t:msg,cp:ev.cp});
  if(ev.cp&&ev.stage>=4&&!G.memories.includes(ev.cp)){G.memories.push(ev.cp);triggerAch('mem_'+ev.cp,CP[ev.cp]?.n+'的记忆','📸 解锁了珍贵的回忆碎片');}
  if(G._tJournal)G.attr.SPR=clamp(G.attr.SPR+1,1,10);
  checkMilestones();
  return{msg,changes,mode:ch.m||'neutral'};
}

function checkMilestones(){
  Object.entries(CP).forEach(([k,cp])=>{const a=cpAvg(k);if(a>=80&&!G.flags['m80_'+k]){G.flags['m80_'+k]=true;triggerAch('m80_'+k,cp.n+'·心意相通','💖 有些话已经不需要说出口了');}if(a>=50&&!G.flags['m50_'+k]){G.flags['m50_'+k]=true;triggerAch('m50_'+k,cp.n+'·逐渐靠近','💛 有什么正在悄然改变');}});
  Object.entries(G.aff).forEach(([id,v])=>{if(v>=90&&!G.flags['a90_'+id]){G.flags['a90_'+id]=true;triggerAch('a90_'+id,'💖 '+CH[id]?.n,CH[id]?.n+'已经把你当作非常重要的人了');}});
}

function triggerAch(id,name,desc){
  if(G.achievements.includes(id))return;G.achievements.push(id);
  toastQ.push({name,desc});if(toastQ.length===1)showToast();
}
function showToast(){
  if(toastQ.length===0)return;const t=toastQ.shift();
  const el=document.createElement('div');el.className='achtoast';
  el.innerHTML=`<div class="achicon">🏆</div><div class="achname">成就解锁：${t.name}</div><div class="achdesc">${t.desc}</div>`;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity 0.5s';setTimeout(()=>{el.remove();if(toastQ.length>0)setTimeout(showToast,300);},500);},2500);
}

function render(phase,data){
  G.phase=phase;const app=document.getElementById('app');
  switch(phase){
    case'title':rTitle(app);break;case'create':rCreate(app);break;
    case'play':rPlay(app,data);break;case'event':rEvent(app,data);break;
    case'aff':rAff(app);break;case'cpview':rCP(app);break;
    case'mem':rMem(app);break;case'journal':rJournal(app);break;
    case'end':rEnd(app);break;case'load':rLoad(app);break;
  }
}

// ─── 随机属性分配器 ───
function randomizeAttrs(){
  const keys=['INT','CHR','STR','AFF','SPR'];
  const attrs={};keys.forEach(k=>attrs[k]=rn(1,5)); // 基础随机1-5
  let remain=15;
  // 随机投入剩余点数
  while(remain>0){
    const k=pk(keys);
    if(attrs[k]<10){attrs[k]++;remain--;}
  }
  return attrs;
}

// ─── 随机天赋选择器 ───
function randomizeTalents(){
  const pool=[...TALENTS].sort(()=>Math.random()-0.5);
  // 根据权重概率抽取2个（高稀有度概率更低，但可能抽到）
  const selected=[];
  const weights=pk([...Array(5)].map((_,i)=>i)); // 随机决定抽卡偏向
  for(let i=0;i<2;i++){
    const r=Math.random();
    let pick;
    if(r<0.05)pick=pool.find(t=>t.g>=5);     // 5%传说
    else if(r<0.20)pick=pool.find(t=>t.g===4); // 15%史诗
    else if(r<0.45)pick=pool.find(t=>t.g===3); // 25%稀有
    else if(r<0.75)pick=pool.find(t=>t.g===2); // 30%普通
    else pick=pool.find(t=>t.g<=1);            // 25%平凡
    if(!pick||selected.find(s=>s.id===pick.id))pick=pool.find(t=>!selected.find(s=>s.id===t.id));
    if(pick)selected.push(pick);
  }
  return selected.slice(0,2);
}

window._go=function(locId){
  G.energy=Math.max(0,G.energy-10);curEv=null;
  // CP事件触发（天赋加成）
  const cpChance=G._tSeventh?0.25:0.12;
  if(Math.random()<cpChance){
    const avail=Object.entries(CPS).filter(([key,data])=>{
      let stage=1;if(G.flags["cp_"+key+"_s1"])stage=2;if(G.flags["cp_"+key+"_s2"])stage=3;if(G.flags["cp_"+key+"_s3"])stage=4;if(G.flags["cp_"+key+"_s4"])stage=5;
      if(!data[stage])return false;
      const avg=cpAvg(key);
      if(stage===1&&avg<10)return false;if(stage===2&&avg<25)return false;if(stage===3&&avg<45)return false;if(stage===4&&avg<60)return false;if(stage===5&&avg<75)return false;
      return !G.flags['cp_'+key+'_s'+stage+'_done'];
    });
    if(avail.length>0){
      const pick2=avail[Math.floor(Math.random()*avail.length)];
      const[key,data]=pick2;let stage=1;
      if(G.flags['cp_'+key+'_s1'])stage=2;if(G.flags['cp_'+key+'_s2'])stage=3;
      if(data[stage]){
        G.flags['cp_'+key+'_s'+stage+'_done']=true;
        curEv={type:'cp',cp:key,stage,narration:`💫 ${CP[key]?.n||''} · Day ${G.day}\n\n`+data[stage].x,choices:data[stage].c};
        render('event');return;
      }
    }
  }
  const ev=genRandomEvent(locId);
  if(ev){curEv=ev;render('event');}
  else render('play',{msg:'这里现在很安静。也许换个时间会有人。',changes:[]});
};

  app.innerHTML=`<div style="text-align:center;padding:10px 0"><h1>📓 百日日记</h1><div style="color:var(--dim);font-size:0.8em">Day ${G.day} · 还剩 ${G.maxDay-G.day} 天</div></div>
<div class="panel fadein">${G.journal.length===0?'<p style="color:var(--dim)">日记是空的。去经历些什么吧。</p>':G.journal.slice(-40).reverse().map(j=>`<div style="background:var(--card);border-radius:8px;padding:10px;margin:4px 0;border-left:3px solid #333;font-size:0.8em;line-height:1.6;color:var(--dim)"><div style="color:var(--accent);font-weight:bold;margin-bottom:3px">📅 Day ${j.day}${j.cp?' · '+CP[j.cp]?.n||'':''}</div><div style="white-space:pre-line">${j.t}</div></div>`).join('')}</div>
<button class="btn btn-p" onclick="render('play')" style="display:block;margin:8px auto">🔙 返回</button>`;
}

// ─── 结局 ───
function rEnd(app){
  try{localStorage.setItem('aotu4_ach',JSON.stringify(G.achievements));}catch(e){}
  const cpR=[];for(const[k,cp]of Object.entries(CP)){const a=cpAvg(k);if(a>=80)cpR.push({k,cp,type:"he",a});else if(a>=45)cpR.push({k,cp,type:"ne",a});}cpR.sort((a,b)=>b.a-a.a);
  const tops=Object.entries(G.aff).filter(([id])=>CH[id]).sort((a,b)=>b[1]-a[1]);
  let et,emoji,title,text;
  if(cpR.length>0&&cpR[0].type==='he'){const b=cpR[0];et='cp_he';emoji=b.cp.e;title=b.cp.n+' · 完美结局';
    text=`一百天。\n\n${b.cp.d}。\n\n你见证了这一切。从试探到靠近，从对视到牵手。\n\n「谢谢。」他们对你说。「谢谢你来了。」\n\n你将离开。\n但你知道——有些东西，比一百天长得多。`;}
  else if(cpR.length>0){const b=cpR[0];et='cp_ne';emoji=b.cp.e;title=b.cp.n+' · 未完待续';
    text=`一百天太短了。\n\n${b.cp.d}。\n\n你看到了开始——但来不及看到结局。\n\n他们交换了联系方式，约定「以后再联系」。\n\n你相信他们会继续走下去。只是你不在场了。`;}
  else if(tops.length>0&&tops[0][1]>=60){const c=CH[tops[0][0]];et='single';emoji=c.e;title='与'+c.n+'的羁绊';
    text=`一百天。\n\n你与${c.n}走得很近。\n\n很多个下午、很多次午餐、很多个平凡又珍贵的瞬间。\n\n你将离开。但你说：「我会写信的。」`;}
  else{et='solo';emoji='🏫';title='独自前行';
    text=`一百天结束了。\n\n你没有特别亲近的人。\n\n离开那天，你回头看了一眼校门。\n\n也许下一次——可以试着走近一些人。`;}

  if(!G.achievements.includes('end_'+et)){G.achievements.push('end_'+et);try{localStorage.setItem('aotu4_ach',JSON.stringify(G.achievements));}catch(e){}}

  app.innerHTML=`<div class="cdbanner"><div class="daynum" style="color:var(--gold)">0</div><div class="daylabel">今 天 离 开</div></div>
<div class="endbox fadein"><div class="endicon">${emoji}</div><h2 style="color:${et==='cp_he'?'var(--accent)':'var(--gold)'}">${title}</h2><p class="endtext">${text}</p>
<div style="margin:25px 0"><button class="btn btn-p pulse" onclick="window._newLoop()" style="font-size:1.1em;padding:12px 36px">🔄 重新开始一百天</button></div>
<button class="btn btn-s" onclick="render('title')">🏠 回到标题</button>
<div style="margin-top:16px;font-size:0.8em;color:var(--dim)">🏆 成就：${G.achievements.length} · 📸 记忆：${G.memories.length}/${Object.keys(CP).length} · 📓 日记：${G.journal.length}条</div></div>`;
}
window._newLoop=function(){startNew();};

// ─── 读档 ───
function rLoad(app){
  const ss=[];for(let i=1;i<=5;i++){const r=localStorage.getItem('aotu4_'+i);if(r){try{const d=JSON.parse(r);ss.push({s:i,n:d.name,day:d.day,t:d._t});}catch(e){}}else ss.push({s:i,n:null});}
  app.innerHTML=`<div style="text-align:center;padding:10px 0"><h1>📂 读取存档</h1></div><div class="panel fadein">
    ${ss.map(s=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--card);border-radius:8px;margin:4px 0">
      <div><strong>存档 ${s.s}</strong>${s.n?` — ${s.n} · 第${s.day||'?'}天`:''}${s.t?`<div style="font-size:0.7em;color:var(--dim)">${new Date(s.t).toLocaleString()}</div>`:''}</div>
      ${s.n?`<button class="btn btn-xs btn-p" onclick="window._ld(${s.s})">读取</button>`:'<span style="color:var(--dim)">空</span>'}</div>`).join('')}
  </div><button class="btn btn-s" onclick="render('title')" style="display:block;margin:8px auto">🔙 返回</button>`;
}
window._ld=function(s){if(loadFrom(s)){curEv=null;G.phase='play';render('play');}};

// ─── 启动 ───
render('title');
</script>
</body>
</html>
